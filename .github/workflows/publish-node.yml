name: Publish node package

on:
    workflow_dispatch:
    push:
        tags:
            - 'v-node-*'

permissions:
    contents: read
    packages: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org
                  scope: '@softros'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build core
              run: npm run build -w packages/core

            - name: Build node
              run: npm run build -w packages/node

            - name: Test core
              run: npm test -w packages/core

            - name: Test node
              run: npm test -w packages/node

            - name: Publish node
              run: npm publish -w packages/node --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
