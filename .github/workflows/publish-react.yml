name: Publish react package

on:
    workflow_dispatch:
    push:
        tags:
            - 'v-react-*'

permissions:
    contents: read
    packages: write

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org
                  scope: '@softros'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Build core
              run: npm run build -w packages/core

            - name: Build react
              run: npm run build -w packages/react

            - name: Test core
              run: npm test -w packages/core

            - name: Test react
              run: npm test -w packages/react

            - name: Publish react
              run: npm publish -w packages/react --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
